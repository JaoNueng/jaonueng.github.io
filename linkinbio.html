<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Thai',sans-serif;background:#07070e;color:#e8e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.container{width:100%;max-width:380px;text-align:center}
.avatar{width:90px;height:90px;border-radius:50%;overflow:hidden;margin:0 auto 16px;border:2px solid rgba(91,140,255,0.3)}
.avatar img{width:100%;height:100%;object-fit:cover}
.name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;background:linear-gradient(135deg,#fff,#a88bff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:24px}
.links{display:flex;flex-direction:column;gap:10px}
.link-btn{display:flex;align-items:center;gap:14px;background:#0f0f1a;border:1px solid #1a1a2e;border-radius:12px;padding:14px 18px;text-decoration:none;color:#e8e8f0;transition:border-color 0.2s}
.link-btn:hover{border-color:#5b8cff}
.link-btn.featured{border-color:rgba(91,140,255,0.4);background:linear-gradient(135deg,#0f0f1a,#111125)}
.link-icon{width:38px;height:38px;border-radius:9px;overflow:hidden;flex-shrink:0}
.link-icon img{width:100%;height:100%;object-fit:cover}
.link-text{text-align:left;flex:1}
.link-title{font-size:14px;font-weight:500;margin-bottom:2px}
.link-sub{font-size:11px;color:#5a5f7a}
.arrow{font-size:13px;color:#3a3f5a}
.footer{margin-top:24px;font-size:11px;color:#2a2f45}
</style>
